show_player:
  shotgun_lane_a_charged:
    shotgun_red_breathe:
      action: stop
      key: shotgun_success_breathe
    shotgun_lane_a_countdown:
      key: shotgun_lane_a_countdown_show
      loops: 0

  shotgun_lane_b_charged:
    shotgun_red_breathe:
      action: stop
      key: shotgun_success_breathe
    shotgun_lane_b_countdown:
      key: shotgun_lane_b_countdown_show
      loops: 0

  shotgun_stop_all:
    shotgun_lane_a_countdown:
      action: stop
      key: shotgun_lane_a_countdown_show
    shotgun_lane_b_countdown:
      action: stop
      key: shotgun_lane_b_countdown_show

  timer_top_lane_a_countdown_timer_complete:
    shotgun_lane_a_countdown:
      action: stop
      key: shotgun_lane_a_countdown_show

  timer_top_lane_b_countdown_timer_complete:
    shotgun_lane_b_countdown:
      action: stop
      key: shotgun_lane_b_countdown_show

  shotgun_hit:
    shotgun_red_breathe:
      key: shotgun_success_breathe
      loops: -1
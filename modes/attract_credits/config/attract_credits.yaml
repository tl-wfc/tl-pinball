#config_version=6
# modes/attract_credits/config/attract_credits.yaml

mode:
  start_events: start_mode_attract_credits
  stop_events: stop_mode_attract_credits
  priority: 8
  game_mode: false
  code: mpf.modes.carousel.code.carousel.Carousel

mode_settings:
  selectable_items:
    - credits_sfx
    - credits_mpf
    - credits_code
    - credits_rules
    - credits_fast
    - credits_cass
  next_item_events: s_08_left_flipper_active, timer_attract_credits_carousel_timer_complete

timers:
  attract_credits_carousel_timer:
    end_value: 1
    tick_interval: 5s
    start_running: true
    control_events:
      - event: item_highlighted
        action: restart
      - event: flipper_cradle
        action: stop
      - event: flipper_cradle_release
        action: restart
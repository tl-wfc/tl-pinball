#config_version=6
# modes/base/config/base.yaml

mode:
  start_events: ball_starting
  stop_events: ball_will_end
  priority: 100

config:
  - base_points.yaml
  - varitarget.yaml
  - shots.yaml
  #- shot_groups.yaml
  #- shot_profiles.yaml
  #- consume_qualify.yaml

event_player:
  mode_base_started: BASE_YAML_LOADED

  s_03_service_enter_active: end_game

  manual_ball_search_requested:
    - start_manual_ball_search

  ball_started{current_player.ball==3}:
    - knights_of_cydonia_started


variable_player:
  mode_base_started:
    pf_multiplier:
      action: set
      int: 1

slide_player:
  mode_base_started:
    base_slide:
      priority: 300

sound_player:
  spinner_left_hit:
    spinner:
      bus: effects
      max_queue_time: 5ms

  ball_started{current_player.ball==1}:
    tl_m_hysteria_fullsong:
      bus: music
      loops: -1

  ball_started{current_player.ball==2}:
    tl_m_mapofprob_fullsong:
      bus: music
      loops: -1

  ball_started{current_player.ball==3}:
    tl_m_koc_fullsong:
      bus: music
      loops: -1

  spinner_right_hit:
    spinner:
      bus: effects
      max_queue_time: 40ms

show_player:
  knights_of_cydonia_started:
    show_koc_vocal_solo_pops_only:
    #show_koc_vocal_solo:
      loops: 1
      speed: 1.0
      priority: 99
      key: koc__vocal_solo




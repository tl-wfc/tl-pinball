      loops: 4
      speed: 2.0
      priority: 500

  ball_started{current_player.ball==1}:
    show_muse_hysteria_radio_full:
      loops: 0
      speed: 1.0
      priority: 10
      key: hysteria_background

    show_floods_hysteria_bassline_1:
      loops: 0
      speed: 1.0
      priority: 200
      key: hysteria_cab

  ball_will_end:
    hysteria_background:
      action: stop
    hysteria_cab:
      action: stop
    koc_cue_master:
      action: stop
    koc_vocal_layer:
      action: stop
    koc_drum_layer:
      action: stop
    koc_bass_layer:
      action: stop
    koc_lead_layer:
      action: stop
    koc_rhythm_layer:
      action: stop
    koc_final_survive_overlay:
      action: stop
    # knights_master:
    #   action: stop

  ball_started{current_player.ball==2}:
    show_muse_mapofprob_radio_full:
      loops: 0
      speed: 1.0
      priority: 10


    l_pf2_4_1: FF0000
    l_pf2_4_3: FF0000
    l_pf2_4_2: 80FF80
    l_pf2_4_4: 40FF40
    l_pf2_4_5: '208020'

# ------------------------------------------------------------
# HYPNOTIC EYE PULSE
# ------------------------------------------------------------

- duration: 100ms
  lights:
    l_pf2_4_1: FF0000
    l_pf2_4_3: '400000'
    l_pf2_4_2: 40FF40
    l_pf2_4_4: '202020'
    l_pf2_4_5: '101010'

- duration: 100ms
  lights:
    l_pf2_4_1: '400000'
    l_pf2_4_3: FF0000
    l_pf2_4_2: 40FF40

- duration: 100ms

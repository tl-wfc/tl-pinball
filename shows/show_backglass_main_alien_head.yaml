#show_version=6
# shows/show_main_alien_head.yaml

# Main alien head
# 1 = right eye
# 2 = nose
# 3 = left eye
# 4 = mouth top
# 5 = mouth bottom

# ------------------------------------------------------------
# WAKE UP / FACE APPEARS
# ------------------------------------------------------------

- duration: 120ms
  lights:
    l_pf2_4_1: off
    l_pf2_4_2: off
    l_pf2_4_3: off
    l_pf2_4_4: off
    l_pf2_4_5: off

- duration: 120ms
  lights:
    l_pf2_4_1: '200000'
    l_pf2_4_3: '200000'

- duration: 120ms
  lights:
    l_pf2_4_1: FF0000
    l_pf2_4_3: FF0000
    l_pf2_4_2: '302000'

- duration: 180ms
  lights:
    l_pf2_4_1: FF4000
    l_pf2_4_3: FF4000
    l_pf2_4_2: '806020'
    l_pf2_4_4: '201010'
    l_pf2_4_5: '201010'

# ------------------------------------------------------------
# ALIEN FACE GLOW
# ------------------------------------------------------------

- duration: 250ms

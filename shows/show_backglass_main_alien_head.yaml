    l_pf2_4_1: FF0000
    l_pf2_4_3: FF0000
    l_pf2_4_2: 40FF40

# ------------------------------------------------------------
# MOUTH / SPEAKING FLICKER
# ------------------------------------------------------------

- duration: 70ms
  lights:
    l_pf2_4_4: FFFFFF
    l_pf2_4_5: 40FF40

- duration: 70ms
  lights:
    l_pf2_4_4: 40FF40
    l_pf2_4_5: FFFFFF

- duration: 60ms
  lights:
    l_pf2_4_4: FF0000
    l_pf2_4_5: FF4000

- duration: 80ms
  lights:
    l_pf2_4_4: 40FF40
    l_pf2_4_5: '208020'

- duration: 60ms
  lights:
    l_pf2_4_4: FFFFFF
    l_pf2_4_5: FFFFFF

- duration: 90ms

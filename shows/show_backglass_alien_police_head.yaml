# shows/show_backglass_alien_police_head.yaml

# Large alien head
# l_pf2_4_18 = mouth bottom
# l_pf2_4_19 = mouth top
# l_pf2_4_20 = left eye
# l_pf2_4_21 = left eye
# l_pf2_4_22 = nose
# l_pf2_4_23 = right eye
# l_pf2_4_24 = right eye

- duration: 100ms

#config_version=6
# config/config_ball_save.yaml

# ------------------------------------------------------------
# BALL SAVE
# ------------------------------------------------------------
# Default ball save that can be enabled by posting the event:
#   ball_save_request
#
# Current trigger:
#   - When the ball leaves the shooter/plunger lane (s_31 becomes inactive)
#
# To add more triggers later, just post 'ball_save_request' from anywhere:
#   event_player:
#     some_new_event: ball_save_request
# ------------------------------------------------------------

ball_saves:
  bs_default:
    active_time: 15s    # Adjustable time the ball save stays active after being enabled
    hurry_up_time: 5s
    enable_events: ball_save_request   # Enable whenever we post this event (from any mode or config)
    disable_events: ball_will_end, ball_ended, game_ending # Safety: make sure it is not running across balls/games
    # Typical defaults (explicit here so behavior is clear)
    balls_to_save: 1
    auto_launch: true

event_player:
  s_31_plunger_lane_inactive{current_player.launch_ball_save_used == 0}:
    ball_save_request

show_player:

  ball_save_bs_default_enabled:
    show_ball_save_insert_purple_white_slow:
      key: ball_save_insert
      loops: -1
      priority: 20000

  ball_save_bs_default_hurry_up:
    show_ball_save_insert_purple_white_fast:
      key: ball_save_insert
      loops: -1
      priority: 20000

  ball_save_bs_default_disabled:
    ball_save_insert:
      action: stop

  ball_will_end:
    ball_save_insert:
      action: stop
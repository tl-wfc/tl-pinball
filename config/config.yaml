#config_version=6
# config/config.yaml
#
# ------------------------
# MODES::
# ------------------------ 
modes:
    - attract
    - attract_scores
    #- service
    - base
    - high_score
    - spinner_2x_qualify
    - spinner_2x
    - super_pops
    - skillshot
    - stars_mode
    - brian_combo
    - autoplunge
    #- consume
# --------------------
# CONFIG::FILES
# --------------------
#
config:
  - config_hardware.yaml
  - config_ball_devices.yaml
  - config_sounds.yaml
  - device_config_lights_led.yaml
  - device_config_game.yaml
  - device_config_iomap.yaml
  - device_config_iomap_coils.yaml
  - config_testing.yaml
  - config_ball_save.yaml
  - seq_shots.yaml

# ------------------------
# Custom Machine Variables:
# ------------------------ 

machine_vars:
  last_game_score:
    initial_value: 0

variable_player:
  game_ended:
    last_game_score:
      action: set_machine
      int: current_player.score

# --------------------
# CONFIG::GAME
# --------------------
#
game:
  balls_per_game: 1
  max_players: 1
machine:
  balls_installed: 1 #How many balls are physically in your game
  min_balls: 1 #How few balls can be accounted for before you can start a game
# ------------------------
# PLAYFIELDS:
# ------------------------ 
playfields:
    playfield:
        default_source_device: bd_plunger
        tags: default

